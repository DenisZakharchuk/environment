[server]
hosts = 0.0.0.0:5232
max_connections = 20
max_content_length = 100000000

[auth]
# Authentication handled upstream by Traefik + Authentik forward auth.
# Radicale trusts the X-Remote-User header set by the forward auth middleware.
type = http_x_remote_user

[storage]
filesystem_folder = /data/collections

[logging]
level = info

[headers]
Access-Control-Allow-Origin = *
Access-Control-Allow-Methods = GET, DELETE, OPTIONS, HEAD, POST, PROPFIND, MKCOL, MOVE, REPORT, PUT
Access-Control-Allow-Headers = User-Agent, Authorization, Content-type, Depth, If-match, If-None-Match, Lock-Token, Overwrite, Prefer, Timeout, X-Client
Access-Control-Expose-Headers = DAV, content-length, Allow
