APP_NAME = Forgejo
RUN_MODE = prod

[server]
DOMAIN           = git.${DOMAIN}
ROOT_URL         = https://git.${DOMAIN}/
HTTP_PORT        = 3000
SSH_DOMAIN       = git.${DOMAIN}
SSH_PORT         = 2222
SSH_LISTEN_PORT  = 22

[database]
DB_TYPE  = postgres
; credentials injected via environment variables

[service]
DISABLE_REGISTRATION              = false
REQUIRE_SIGNIN_VIEW               = false
REGISTER_EMAIL_CONFIRM            = false
ENABLE_NOTIFY_MAIL                = false
ALLOW_ONLY_EXTERNAL_REGISTRATION  = false
ENABLE_CAPTCHA                    = false
DEFAULT_KEEP_EMAIL_PRIVATE        = true

[oauth2]
ENABLE = true

[mailer]
ENABLED = false
; Enable and configure after mail stack is up:
; ENABLED    = true
; FROM       = forgejo@${DOMAIN}
; SMTP_ADDR  = stalwart-mail
; SMTP_PORT  = 587
; USER       = forgejo@${DOMAIN}
; PASSWD     = change-me

[log]
MODE      = console
LEVEL     = info
ROOT_PATH = /data/gitea/log

[security]
INSTALL_LOCK              = true
MIN_PASSWORD_LENGTH       = 12
PASSWORD_COMPLEXITY       = lower,upper,digit,spec

[repository]
DEFAULT_BRANCH = main
