global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: traefik
    static_configs:
      - targets: ["traefik:8080"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  # Add more jobs as services expose /metrics endpoints
  # - job_name: forgejo
  #   static_configs:
