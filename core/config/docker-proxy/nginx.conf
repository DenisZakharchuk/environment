worker_processes 1;
events { worker_connections 256; }

http {
  upstream docker_backend {
    server unix:/var/run/docker.sock;
  }

  server {
    listen 2375;

    # Rewrite any /vX.Y/ API version prefix to /v1.41/ so that clients
    # using old default versions (e.g. 1.24) are accepted by Docker 25+
    location ~ ^/v[0-9]+\.[0-9]+(.*)$ {
      rewrite ^/v[0-9]+\.[0-9]+(.*)$ /v1.41$1 break;
      proxy_pass         http://docker_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host "localhost";
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection $http_connection;
      proxy_read_timeout 3600;
      proxy_send_timeout 3600;
      proxy_buffering    off;
      proxy_request_buffering off;
    }

    # Unversioned paths (/_ping, /version, /info) pass through unchanged
    location / {
      proxy_pass         http://docker_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host "localhost";
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection $http_connection;
      proxy_read_timeout 3600;
      proxy_send_timeout 3600;
      proxy_buffering    off;
      proxy_request_buffering off;
    }
  }
}
